version: "3.8"

services:
  # ── Reverse Proxy ──
  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@agenthub.io"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - agenthub

  # ── Control Plane (TypeScript / NestJS) ──
  control-plane:
    build:
      context: ../ts-control-plane
      dockerfile: ../docker/Dockerfile.control-plane
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cp.rule=PathPrefix(\`/api\`,\`/graphql\`,\`/ws\`)"
      - "traefik.http.services.cp.loadbalancer.server.port=3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://agenthub:agenthub@postgres:5432/agenthub_cp
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:?required}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      - postgres
      - redis
    networks:
      - agenthub

  # ── Data Plane (Go / Gin + gRPC) ──
  data-plane:
    build:
      context: ../go-data-plane
      dockerfile: deployments/Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dp.rule=PathPrefix(\`/dp\`)"
      - "traefik.http.services.dp.loadbalancer.server.port=8080"
    environment:
      - GRPC_ADDR=:50051
      - HTTP_ADDR=:8080
      - DOCKER_HOST=unix:///var/run/docker.sock
      - CP_API_URL=http://control-plane:3000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - control-plane
    networks:
      - agenthub

  # ── Frontend (React / Vite) ──
  web:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(\`app.agenthub.localhost\`)"
      - "traefik.http.services.web.loadbalancer.server.port=80"
    networks:
      - agenthub

  # ── PostgreSQL (Shared, logical isolation via DB name) ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub
      POSTGRES_DB: agenthub_cp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - agenthub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub -d agenthub_cp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Shared, DB index isolation) ──
  redis:
    image: redis:7-alpine
    networks:
      - agenthub
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Monitoring ──
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - agenthub

  grafana:
    image: grafana/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - agenthub

volumes:
  postgres_data:
  redis_data:
  letsencrypt:

networks:
  agenthub:
    driver: bridge
